<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Images</title>
  </head>
  <body>
    <!--  display image -->
    <img
      src="https://imageio.forbes.com/specials-images/imageserve/5d35eacaf1176b0008974b54/0x0.jpg?format=jpg&crop=4560,2565,x790,y784,safe&height=900&width=1600&fit=bounds"
      alt="Car image"
      width="600"
    />

    <hr />

    <!-- Link as a image  -->
    <a href="https://google.com" target="_blank">
      <img
        src="https://thumbs.dreamstime.com/b/google-logo-vector-format-white-background-illustration-407571048.jpg"
        alt="Google logo"
        width="200"
      />
    </a>

    <!-- For image caption  -->
    <figure>
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRW9h4fU35Nb2lGTCcT-GS1pVkWd5gqV0yegw&s"
        alt="Mountain View"
        width="300"
      />
      <figcaption>Beautiful mountain view</figcaption>
    </figure>

    <img src="mountain.jpg" width="400" alt="Large Image" loading="lazy" />
  </body>
</html>
